services:
  # 1. FastAPI Backend
  api:
    build: ./api
    container_name: brain-analytics-api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/code
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
    restart: always

  # 2. Next.js Frontend
  app:
    build: ./app
    container_name: brain-analytics-app
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - /app/node_modules # Prevents local modules from overwriting container modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: always

networks:
  default:
    name: sports-network